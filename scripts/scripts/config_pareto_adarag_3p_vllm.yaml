seed: 42
output_dir: outputs_pareto_adarag_3p_vllm_top0_p035_heavy5_10_smoothcvar_addmu0.01

slot_size: 90
n_slots: 15

doc_choices_light: [1, 2, 3, 4]
doc_choices_heavy: [5, 6, 7, 8, 9, 10]

beta: 0.95
acc_mode: token

system:
  force_heavy: false
  prompt_max_doc_chars: 1600
  exec_mode: overlap
  heavy_max_workers: 2
  llm_max_workers: 8
  sim_score_topn: 4
  judge_enabled_for_g: true
  judge_enabled_for_dpsi: false
  cvar_kappa: 5.0
 
normalization:
  enabled: true
  d_ref: 10.0
  psi_ref: 10.0
  g_ref: 0.03

light_retriever:
  corpus_path: /T20050013/adarag_repro/adarag_assets/data/kb/wiki_passages_w100_1m.jsonl
  index_path: /T20050013/adarag_repro/adarag_assets/data/kb/faiss_hnsw_full_bge.index
  embedding_model: /T20050013/adarag_repro/adarag_assets/bge-base-en-v1.5/BAAI/bge-base-en-v1.5
  rebuild: false
  device: cpu
  top_n: 10

heavy_retriever:
  type: hybrid_dense_bm25
  top_n: 10

  es_url: http://127.0.0.1:9200
  index_name: adarag_kb_v2_1m
  request_timeout: 120

  bm25_query_mode: text_only_simple
  bm25_k: 50
  bm25_top_n: 50
  bm25_max_per_title: 10

  dense_top_n: 50

  merge_mode: protected_rrf
  dense_keep_n: 8
  bm25_keep_n: 2
  rrf_k: 60
  dense_weight: 1.0
  bm25_weight: 0.2

  simplify_bm25: true
  rewrite_mode: none
  reranker_model:
  rerank_k: 0

  dedup_key_mode: title_text
  max_per_title: 5

  profile: false
  device: cpu

llm:
  backend: openai_compat
  base_url: http://127.0.0.1:8000/v1
  api_key: EMPTY
  model: qwen25-7b
  system_prompt: "You are a helpful assistant."
  max_new_tokens: 16
  temperature: 0.0
  top_p: 1.0
  request_timeout_s: 120
  max_retries: 2
  retry_sleep_s: 1

optimizer:
  q_target: 0.60
  init_doc_policy: increasing
  init_top0_prob: 0.0
  p_init: 0.35
  p_min: 0.0
  p_max: 1.0
  alpha: 0.0005
  mu: 0.01
  delta: 0.05
  gamma: 0.05
  nu_min: 0.0
  nu_max: 60.0
  nu_init: 8.0

dataset:
  split: validation
  max_examples: 3300
  local_path: /T20050013/adarag_repro/adarag_assets/data/datasets/nq_open_validation.jsonl

judge_llm:
  backend: hf
  model: /T20050013/adarag_repro/adarag_assets/Qwen1.5-14B-Chat
  tokenizer: /T20050013/adarag_repro/adarag_assets/Qwen1.5-14B-Chat
  device: cuda
  dtype: float16
  use_chat_template: true
  system_prompt: "You are a strict QA evaluator."
  max_new_tokens: 8
  temperature: 0.0
  top_p: 1.0
  top_k: 0
  repetition_penalty: 1.0
  local_files_only: true
  trust_remote_code: false